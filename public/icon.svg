<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#0f172a"/>
  
  <!-- Code brackets with document -->
  <g transform="translate(50, 50)">
    <!-- Document shape -->
    <rect x="10" y="20" width="80" height="100" rx="4" fill="none" stroke="#3b82f6" stroke-width="3"/>
    
    <!-- Document lines (representing code) -->
    <line x1="20" y1="35" x2="70" y2="35" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="50" x2="85" y2="50" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="65" x2="75" y2="65" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="80" x2="80" y2="80" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="95" x2="70" y2="95" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="110" x2="85" y2="110" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Left code bracket -->
    <path d="M 0 40 L 8 40 L 8 100 L 0 100" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Right code bracket -->
    <path d="M 100 40 L 92 40 L 92 100 L 100 100" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>